name: Shopify Stock Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  STATE_FILE: state.json
  PRODUCT_URL: https://www.themobilemarvel.com/products/oppo-find-n6-global-version-used
  COLLECTION_URL: https://www.themobilemarvel.com/collections/used-smartphones/products.json?limit=250

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check stock
        id: check
        run: |
          set -euo pipefail

          # Load previous state
          if [ -f "$STATE_FILE" ] && jq -e '.' "$STATE_FILE" >/dev/null 2>&1; then
            prev_product=$(jq -r '.product_available // false' "$STATE_FILE")
            prev_collection=$(jq -r '.collection_count // 0' "$STATE_FILE")
          else
            prev_product=false
            prev_collection=0
          fi

          fetch_html() {
            curl --silent --location --retry 2 --retry-delay 3 \
                 --max-time 20 --compressed \
                 -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                 -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8" \
                 -H "Accept-Language: en-GB,en;q=0.9" \
                 -w "%{http_code}" -o "$2" "$1" || echo "000"
          }

          fetch_json() {
            curl --silent --location --retry 2 --retry-delay 3 \
                 --max-time 20 --compressed \
                 -H "User-Agent: Mozilla/5.0 (compatible; stock-monitor/1.0)" \
                 -H "Accept: application/json" \
                 -w "%{http_code}" -o "$2" "$1" || echo "000"
          }

          # --- Product check ---
          # This Shopify theme has NO inline JSON. Stock state is SSR'd by Liquid
          # directly into button text. "Sold out" appears when out of stock;
          # "Add to cart" when available. IMPORTANT: check "Sold out" FIRST —
          # "Add to cart" can appear in related product widgets lower on the page
          # even when the main product is sold out.
          prod_tmp=$(mktemp)
          col_tmp=$(mktemp)
          trap 'rm -f "$prod_tmp" "$col_tmp"' EXIT

          prod_status=$(fetch_html "$PRODUCT_URL" "$prod_tmp")
          product_available=$prev_product

          if [ "$prod_status" = "200" ]; then
            if grep -qi 'sold.out' "$prod_tmp"; then
              product_available=false
              echo "Product check: 'Sold out' found -> available=false"
            elif grep -qi 'add to cart' "$prod_tmp"; then
              product_available=true
              echo "Product check: no 'Sold out', 'Add to cart' found -> available=true"
            else
              echo "::warning::Could not determine stock status from page HTML -- keeping previous state"
            fi
          elif [ "$prod_status" = "404" ]; then
            product_available=false
            echo "Product check: HTTP 404 -> unpublished, available=false"
          else
            echo "::warning::Product fetch failed (HTTP $prod_status) -- keeping previous state"
          fi

          # --- Collection check ---
          col_status=$(fetch_json "$COLLECTION_URL" "$col_tmp")
          collection_count=$prev_collection

          if [ "$col_status" = "200" ] && jq -e '.' "$col_tmp" >/dev/null 2>&1; then
            collection_count=$(jq '[.products[]? | select((.title // "" | ascii_downcase) | contains("find n6"))] | length' "$col_tmp")
            echo "Collection check: found $collection_count Find N6 listing(s)"
          else
            echo "::warning::Collection fetch failed (HTTP $col_status) -- keeping previous count"
          fi

          # --- Transition detection (notify only on false -> true) ---
          product_triggered=false
          collection_triggered=false
          [ "$product_available" = "true" ] && [ "$prev_product"    != "true" ] && product_triggered=true
          [ "$collection_count"  -gt 0    ] && [ "$prev_collection" -eq 0    ] && collection_triggered=true

          notify=false
          { [ "$product_triggered" = "true" ] || [ "$collection_triggered" = "true" ]; } && notify=true

          # --- Only commit when meaningful fields change ---
          state_changed=false
          if [ "$product_available" != "$prev_product" ] || [ "$collection_count" != "$prev_collection" ]; then
            state_changed=true
            jq -n \
              --arg pa "$product_available" \
              --argjson cc "$collection_count" \
              --arg ts "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              '{product_available: ($pa == "true"), collection_count: $cc, last_checked: $ts}' \
              > "$STATE_FILE"
          fi

          {
            echo "product_available=$product_available"
            echo "collection_count=$collection_count"
            echo "product_triggered=$product_triggered"
            echo "collection_triggered=$collection_triggered"
            echo "state_changed=$state_changed"
            echo "notify=$notify"
          } >> "$GITHUB_OUTPUT"

      - name: Send ntfy.sh notification
        if: steps.check.outputs.notify == 'true'
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          set -euo pipefail
          [ -z "${NTFY_TOPIC:-}" ] && { echo "::warning::NTFY_TOPIC secret not set"; exit 0; }

          if [ "${{ steps.check.outputs.product_triggered }}" = "true" ]; then
            MSG="Product page is IN STOCK - buy now! https://www.themobilemarvel.com/products/oppo-find-n6-global-version-used"
          else
            MSG="New Find N6 listing in used collection (${{ steps.check.outputs.collection_count }} result(s)) - https://www.themobilemarvel.com/collections/used-smartphones"
          fi

          curl -s \
            -H "Title: Find N6 LIVE!" \
            -H "Priority: urgent" \
            -H "Tags: shopping,rotating_light" \
            -d "$MSG" \
            "https://ntfy.sh/${NTFY_TOPIC}"

      - name: Commit state change
        if: steps.check.outputs.state_changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$STATE_FILE"
          git diff --cached --quiet || git commit -m "state: product=${{ steps.check.outputs.product_available }} collection=${{ steps.check.outputs.collection_count }}"
          git push
